name: Release (Pixi)

on:
  workflow_call:
    inputs:
      config-file:
        type: string
        default: "release-please-config.json"
      manifest-file:
        type: string
        default: ".release-please-manifest.json"
      commit-message:
        type: string
        default: "chore: update pixi.lock"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).number || '' }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}

  update-lockfile:
    needs: release-please
    if: needs.release-please.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ needs.release-please.outputs.pr_number }}
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          locked: false
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ inputs.commit-message }}
          file_pattern: pixi.lock
